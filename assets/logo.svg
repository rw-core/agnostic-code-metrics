<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240" role="img" aria-label="agnostic-code-metrics: a honeycomb whose six cells are the metrics Cyclomatic, Cognitive, NPath, ABC, Est. Bugs and Maintainability around a central composite score">
  <defs>
    <linearGradient id="t" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1B222D"/><stop offset="1" stop-color="#0D1117"/></linearGradient>
    <linearGradient id="b" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#AEB9CD"/><stop offset="1" stop-color="#7E8DA8"/></linearGradient>
    <linearGradient id="a" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#F5B031"/><stop offset="1" stop-color="#FFC94D"/></linearGradient>
    <linearGradient id="c" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5A6884"/><stop offset="1" stop-color="#3C475C"/></linearGradient>
  </defs>
  <rect x="8" y="8" width="384" height="224" rx="28" fill="url(#t)"/>
  <rect x="8.75" y="8.75" width="382.5" height="222.5" rx="27.25" fill="none" stroke="#2B3644" stroke-width="1.5"/>

  <!-- leader lines from each metric cell to its label -->
  <g stroke="#3A4657" stroke-width="1.5" stroke-linecap="round">
    <line x1="119.95" y1="87"  x2="94"  y2="87"/>
    <line x1="100.85" y1="120" x2="94"  y2="120"/>
    <line x1="119.95" y1="153" x2="94"  y2="153"/>
    <line x1="196.05" y1="87"  x2="260" y2="87"/>
    <line x1="215.15" y1="120" x2="260" y2="120"/>
    <line x1="196.05" y1="153" x2="260" y2="153"/>
  </g>

  <!-- honeycomb: one composite centre + six metric cells (walls = dark) -->
  <g stroke="#0D1117" stroke-width="2.5" stroke-linejoin="round">
    <!-- Cyclomatic (upper-left) -->
    <path d="M139 65 L119.95 76 L119.95 98 L139 109 L158.05 98 L158.05 76 Z" fill="url(#c)"/>
    <!-- Cognitive (left) -->
    <path d="M119.9 98 L100.85 109 L100.85 131 L119.9 142 L138.95 131 L138.95 109 Z" fill="url(#c)"/>
    <!-- NPath (lower-left) -->
    <path d="M139 131 L119.95 142 L119.95 164 L139 175 L158.05 164 L158.05 142 Z" fill="url(#c)"/>
    <!-- ABC (upper-right) -->
    <path d="M177 65 L157.95 76 L157.95 98 L177 109 L196.05 98 L196.05 76 Z" fill="url(#c)"/>
    <!-- Est. Bugs (right) -->
    <path d="M196.1 98 L177.05 109 L177.05 131 L196.1 142 L215.15 131 L215.15 109 Z" fill="url(#c)"/>
    <!-- Maintainability (lower-right) = the amber gated metric -->
    <path d="M177 131 L157.95 142 L157.95 164 L177 175 L196.05 164 L196.05 142 Z" fill="url(#a)"/>
    <!-- composite score (centre) -->
    <path d="M158 98 L138.95 109 L138.95 131 L158 142 L177.05 131 L177.05 109 Z" fill="url(#b)"/>
  </g>

  <!-- cell nodes -->
  <g stroke="none">
    <circle cx="139"    cy="87"  r="2.6" fill="#AEB9CD"/>
    <circle cx="119.9"  cy="120" r="2.6" fill="#AEB9CD"/>
    <circle cx="139"    cy="153" r="2.6" fill="#AEB9CD"/>
    <circle cx="177"    cy="87"  r="2.6" fill="#AEB9CD"/>
    <circle cx="196.1"  cy="120" r="2.6" fill="#AEB9CD"/>
    <circle cx="177"    cy="153" r="2.6" fill="#0D1117"/>
    <circle cx="158"    cy="120" r="3.4" fill="url(#a)"/>
  </g>

  <!-- metric labels, one per cell -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="600" dominant-baseline="central">
    <text x="92"  y="87"  text-anchor="end"   fill="#C9D3E0">Cyclomatic</text>
    <text x="92"  y="120" text-anchor="end"   fill="#C9D3E0">Cognitive</text>
    <text x="92"  y="153" text-anchor="end"   fill="#C9D3E0">NPath</text>
    <text x="262" y="87"  text-anchor="start" fill="#C9D3E0">ABC</text>
    <text x="262" y="120" text-anchor="start" fill="#C9D3E0">Est. Bugs</text>
    <text x="262" y="153" text-anchor="start" fill="#F5B031">Maintainability</text>
  </g>

  <!-- wordmark -->
  <text x="200" y="216" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="600" fill="#7E8DA8" letter-spacing="0.5">agnostic-code-metrics</text>
</svg>
